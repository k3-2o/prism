rules:
  - id: prism.ts.unhandled-promise
    patterns:
      - pattern: |
          $PROMISE.then(...)
      - pattern-not: |
          $PROMISE.then(...).catch(...)
      - pattern-not: |
          $PROMISE.then(...).then(...).catch(...)
      - pattern-not: |
          await $PROMISE.then(...)
    message: >
      Promise .then() call without .catch() or await.
      Unhandled promise rejections crash the process in Node.js.
      Either await the promise, chain a .catch() handler, or use async/await
      inside a try/catch block.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: "correctness"
      source: "prism-curated"
