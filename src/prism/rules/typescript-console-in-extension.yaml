rules:
  - id: prism.ts.console-in-extension
    pattern-either:
      - pattern: |
          console.log($MSG)
      - pattern: |
          console.error($MSG)
      - pattern: |
          console.warn($MSG)
      - pattern: |
          console.debug($MSG)
    message: >
      Use ctx.ui.notify() instead of console.log/error/warn/debug in pi extensions.
      Raw console output bypasses pi's UI layer and won't be visible to the user in TUI or RPC modes.
      If you need to log for debugging, use a proper logging setup or ctx.ui.notify().
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: "dev-tooling"
      source: "prism-curated"
