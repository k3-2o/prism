rules:
  - id: prism.ts.any-type
    pattern-either:
      - pattern: |
          function $FUNC(...) : any { ... }
      - pattern: |
          const $X: any = $Y
      - pattern: |
          let $X: any = $Y
      - pattern: |
          var $X: any = $Y
      - pattern: |
          $X: any
    message: >
      Avoid using 'any' type — it defeats TypeScript's type checking.
      Use 'unknown' instead if the type is truly uncertain, then validate
      with runtime checks. For tool parameters, use TypeBox schemas.
      'any' silently hides bugs that would otherwise be caught at compile time.
    languages: [typescript]
    severity: WARNING
    metadata:
      category: "correctness"
      source: "prism-curated"
