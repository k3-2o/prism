rules:
  - id: prism.correctness.is-with-string-literal
    pattern: |
      $X is "..."
    message: >
      Use '==' instead of 'is' for string comparison.
      'is' checks object identity, not value equality.
    languages: [python]
    severity: WARNING

  - id: prism.correctness.is-with-number-literal
    pattern: |
      $X is $NUM
    metavariable-pattern:
      metavariable: $NUM
      pattern-either:
        - pattern: |
            0
        - pattern: |
            1
        - pattern: |
            True
        - pattern: |
            False
        - pattern: |
            None
    message: >
      Use '==' instead of 'is' for literal comparison.
      'is' checks object identity, not value equality.
    languages: [python]
    severity: WARNING
