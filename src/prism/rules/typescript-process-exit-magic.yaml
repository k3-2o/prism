rules:
  - id: prism.ts.process-exit-magic
    pattern: |
      process.exit($NUM)
    metavariable-pattern:
      metavariable: $NUM
      pattern-either:
        - pattern: |
            0
        - pattern: |
            1
        - pattern: |
            2
    message: >
      Use named exit code constants instead of magic numbers in process.exit().
      Magic exit codes make the code harder to understand and maintain.
      Define constants like EXIT_CODES.SUCCESS, EXIT_CODES.ERROR and use those instead.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: "dev-tooling"
      source: "prism-curated"
